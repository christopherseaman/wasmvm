<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>wasmvm</title>
  <link rel="stylesheet" href="./node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ddd; font-family: ui-monospace, monospace; }
    #term { position: absolute; inset: 0 0 22px 0; }
    #status {
      position: absolute; left: 0; right: 0; bottom: 0; height: 22px;
      background: #111; color: #888; font-size: 12px; line-height: 22px; padding: 0 8px;
      border-top: 1px solid #222; user-select: none;
    }
    #status[data-state="ok"] { color: #4ade80; }
    #status[data-state="err"] { color: #f87171; }
  </style>
</head>
<body>
  <div id="term"></div>
  <div id="status" data-state="boot">booting…</div>
  <script type="module" src="./bootstrap.js"></script>
</body>
</html>
